apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "koh.fullname" . }}-api
  labels:
    {{- include "koh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "koh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "koh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "koh.fullname" . }}-config
            - secretRef:
                name: {{ include "koh.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /api/status
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.env.dataDir }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "koh.sharedVolumeClaimName" . }}
